<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古文探究練習｜學生版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1714;--ink-mid:#3d3830;--ink-lt:#7a7268;
  --paper:#f7f3ee;--paper-2:#ede8e0;--paper-3:#ddd5c8;
  --cat1:#8b2020;--cat1-lt:#f5e8e8;
  --cat2:#1a5c38;--cat2-lt:#e6f2ec;
  --cat3:#1e3a6e;--cat3-lt:#e6ecf5;
  --gold:#b8860b;--gold-lt:#faf3df;
  --s1:#991b1b;--s1l:#fff0f0;
  --s2:#854d0e;--s2l:#fffbeb;
  --s3:#166534;--s3l:#f0fdf4;
  --s4:#1e40af;--s4l:#eff6ff;
  --s5:#5b21b6;--s5l:#f5f3ff;
  --pisa1:#0f766e;--pisa1l:#f0fdfa;
  --pisa2:#7c3aed;--pisa2l:#f5f3ff;
  --pisa3:#be185d;--pisa3l:#fdf2f8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);line-height:1.7;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(247,243,238,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--paper-3);padding:0.65rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nav-logo{font-family:'Noto Serif TC',serif;font-size:0.88rem;font-weight:700;color:var(--ink);text-decoration:none}
.nav-right{display:flex;align-items:center;gap:0.75rem}
.nav-home{font-size:0.75rem;color:var(--ink-lt);text-decoration:none;padding:0.3rem 0.7rem;border:1px solid var(--paper-3);border-radius:3px}
.nav-home:hover{border-color:var(--ink-lt)}

/* HERO */
.hero{padding:3rem 1.5rem 2rem;text-align:center;position:relative}
.hero-badge{display:inline-block;font-size:0.65rem;letter-spacing:0.18em;color:var(--cat1);border:1px solid var(--cat1);padding:0.25rem 0.8rem;border-radius:2px;margin-bottom:1rem;text-transform:uppercase}
.hero h1{font-family:'Noto Serif TC',serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;line-height:1.25;margin-bottom:0.6rem}
.hero h1 em{font-style:italic;font-family:'DM Serif Display',serif;color:var(--cat1)}
.hero-desc{font-size:0.88rem;color:var(--ink-lt);max-width:480px;margin:0 auto 1.5rem;font-weight:300}

/* META ROW */
.meta-bar{background:white;border:1px solid var(--paper-3);border-radius:6px;padding:0.75rem 1rem;display:flex;gap:0.6rem;flex-wrap:wrap;max-width:680px;margin:0 auto 1.5rem}
.meta-bar input{flex:1;min-width:80px;font-size:0.8rem;padding:0.4rem 0.6rem;border:1px solid var(--paper-3);border-radius:4px;background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif}

/* LESSON PICKER */
.picker-wrap{max-width:780px;margin:0 auto 2rem;padding:0 1.5rem}
.picker-label{font-size:0.7rem;letter-spacing:0.12em;color:var(--ink-lt);margin-bottom:0.6rem}
.picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.4rem}
.pb{padding:0.5rem 0.7rem;border-radius:4px;border:1px solid var(--paper-3);font-size:0.75rem;cursor:pointer;background:white;color:var(--ink-mid);text-align:left;line-height:1.3;transition:all .15s}
.pb:hover{border-color:var(--ink-lt)}
.pb.active{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.pb.done{border-color:#639922;background:#EAF3DE;color:#3B6D11}
.cat-tag{display:block;font-size:0.6rem;font-weight:500;margin-bottom:2px}
.ct1{color:var(--cat1)}.ct2{color:var(--cat2)}.ct3{color:var(--cat3)}

/* MAIN CONTENT */
.main{max-width:780px;margin:0 auto;padding:0 1.5rem 4rem}

/* PISA PHASE TABS */
.phase-nav{display:flex;gap:0.4rem;margin-bottom:1.25rem;flex-wrap:wrap}
.phase-btn{padding:0.4rem 1rem;border-radius:4px;border:1px solid var(--paper-3);font-size:0.75rem;cursor:pointer;background:white;color:var(--ink-lt);transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.phase-btn:hover{border-color:var(--ink-lt);color:var(--ink)}
.phase-btn.p1.on{background:var(--pisa1l);color:var(--pisa1);border-color:var(--pisa1)}
.phase-btn.p2.on{background:var(--pisa2l);color:var(--pisa2);border-color:var(--pisa2)}
.phase-btn.p3.on{background:var(--pisa3l);color:var(--pisa3);border-color:var(--pisa3)}

/* PROGRESS */
.prog-wrap{margin-bottom:1rem}
.prog-row{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--ink-lt);margin-bottom:0.3rem}
.prog-bar{height:4px;background:var(--paper-3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:#378ADD;transition:width .4s}

/* STEP DOTS */
.dots{display:flex;gap:0.4rem;margin-bottom:1rem}
.dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--paper-3);font-size:0.7rem;font-weight:500;cursor:pointer;background:white;color:var(--ink-lt);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.dot.done-d{background:#EAF3DE;color:#3B6D11;border-color:#97C459}

/* SOURCE BOX */
.src-box{background:white;border:1px solid var(--paper-3);border-radius:6px;padding:0.75rem 1rem;margin-bottom:1rem;cursor:pointer}
.src-hd{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--ink-lt);font-weight:500;margin-bottom:0.4rem}
.src-text{font-family:'Noto Serif TC',serif;font-size:0.95rem;line-height:2;color:var(--ink)}
.src-text.hide{display:none}

/* PHASE SECTIONS */
.phase-section{display:none}
.phase-section.on{display:block}

/* PISA HEADER */
.pisa-head{border-radius:6px;padding:0.75rem 1rem;margin-bottom:1rem;border:1px solid}
.pisa-head.p1{background:var(--pisa1l);border-color:#99f6e4;color:var(--pisa1)}
.pisa-head.p2{background:var(--pisa2l);border-color:#ddd6fe;color:var(--pisa2)}
.pisa-head.p3{background:var(--pisa3l);border-color:#fbcfe8;color:var(--pisa3)}
.pisa-head h3{font-size:0.85rem;font-weight:500;margin-bottom:0.2rem}
.pisa-head p{font-size:0.72rem;opacity:0.8;line-height:1.4}

/* CARDS */
.card{background:white;border:1px solid var(--paper-3);border-radius:8px;overflow:hidden;margin-bottom:0.75rem}
.card-hd{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1rem}
.nc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:500;color:white;flex-shrink:0}
.ct{font-size:0.88rem;font-weight:500;color:var(--ink)}
.cs{font-size:0.7rem;color:var(--ink-lt)}
.card-b{padding:0.75rem 1rem;border-top:1px solid var(--paper-3)}
.tip{border-left:2px solid var(--paper-3);padding:0.35rem 0.6rem;font-size:0.75rem;color:var(--ink-lt);margin-bottom:0.5rem;line-height:1.5}
.scaf{border:1px dashed var(--paper-3);border-radius:4px;padding:0.4rem 0.65rem;font-size:0.72rem;color:var(--ink-lt);margin-bottom:0.5rem;display:none;line-height:1.5}
.scaf.on{display:block}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;margin-bottom:0.4rem}
.tbl td{padding:4px 6px;border:1px solid var(--paper-3);font-size:0.82rem;vertical-align:top}
.tbl .og{background:var(--paper);color:var(--ink);width:44%}
.tbl textarea{width:100%;border:none;background:transparent;font-size:0.82rem;font-family:'Noto Sans TC',sans-serif;color:var(--ink);resize:none;min-height:38px;outline:none;padding:1px;line-height:1.5}
.gtbl{width:100%;border-collapse:collapse;margin-bottom:0.5rem}
.gtbl td{padding:4px 7px;border-bottom:1px solid var(--paper-3);font-size:0.78rem;vertical-align:top}
.gw{font-weight:500;color:var(--ink);width:28%}
.gm{color:var(--ink-lt)}
.mw{border:1px solid var(--paper-3);border-radius:4px;padding:4px 7px;min-height:30px;display:flex;flex-wrap:wrap;align-items:center;gap:3px;cursor:text}
.wb{display:inline-flex;align-items:center;gap:2px;background:#E6F1FB;color:#0C447C;border-radius:3px;padding:1px 6px;font-size:0.7rem}
.wb span{cursor:pointer;opacity:.5}
.wi{border:none;background:none;outline:none;font-size:0.72rem;color:var(--ink);min-width:55px;font-family:'Noto Sans TC',sans-serif}
.ta{width:100%;border:1px solid var(--paper-3);border-radius:4px;padding:0.5rem 0.7rem;font-size:0.82rem;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:white;resize:vertical;min-height:80px;line-height:1.7}
.ta:focus{outline:none;border-color:var(--ink-lt)}
.ta-sm{min-height:50px}

/* RETRIEVAL PRACTICE */
.retrieval-box{background:var(--gold-lt);border:1px solid #fde68a;border-radius:6px;padding:0.75rem 1rem;margin-bottom:0.75rem}
.retrieval-box h4{font-size:0.8rem;font-weight:500;color:var(--gold);margin-bottom:0.4rem;display:flex;align-items:center;gap:0.4rem}
.retrieval-box p{font-size:0.72rem;color:#78350f;margin-bottom:0.5rem;line-height:1.4}

/* LOCK MECHANISM */
.lock-overlay{background:var(--paper-2);border:1px dashed var(--paper-3);border-radius:4px;padding:0.75rem 1rem;text-align:center;margin-bottom:0.5rem}
.lock-overlay p{font-size:0.78rem;color:var(--ink-lt);margin-bottom:0.5rem}
.lock-check{font-size:0.72rem;color:var(--ink-lt)}

/* BUTTONS */
.br{display:flex;gap:0.5rem;margin-top:0.65rem;flex-wrap:wrap;align-items:center}
.btn{padding:0.4rem 1rem;border-radius:4px;border:1px solid var(--paper-3);font-size:0.78rem;cursor:pointer;background:white;color:var(--ink);transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.btn:hover{background:var(--paper-2)}
.btn.ok{background:#EAF3DE;color:#27500A;border-color:#97C459}
.btn.ask{color:var(--ink-lt);font-size:0.7rem;opacity:0.6;cursor:not-allowed}
.btn.ask.unlocked{color:var(--ink-lt);opacity:1;cursor:pointer}
.btn.ask.unlocked:hover{background:var(--paper-2);color:var(--ink)}
.btn.nxt{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.hint{font-size:0.65rem;color:var(--ink-lt);margin-top:0.3rem}

/* PISA QUESTION CARDS */
.pq-card{background:white;border:1px solid var(--paper-3);border-radius:6px;padding:0.85rem 1rem;margin-bottom:0.65rem}
.pq-type{font-size:0.62rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.35rem}
.pq-q{font-size:0.85rem;color:var(--ink);margin-bottom:0.5rem;line-height:1.5}
.pq-options{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.5rem}
.pq-opt{display:flex;align-items:flex-start;gap:0.5rem;padding:0.4rem 0.6rem;border:1px solid var(--paper-3);border-radius:4px;cursor:pointer;font-size:0.8rem;transition:all .15s;background:white}
.pq-opt:hover{border-color:var(--ink-lt);background:var(--paper)}
.pq-opt.sel{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.pq-opt.correct{border-color:#639922;background:#EAF3DE;color:#27500A}
.pq-opt.wrong{border-color:#dc2626;background:#fee2e2;color:#991b1b}
.pq-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--paper-3);flex-shrink:0;margin-top:2px;transition:all .15s}
.pq-opt.sel .pq-radio,.pq-opt.correct .pq-radio{border-color:currentColor;background:currentColor}
.pq-explain{font-size:0.72rem;color:var(--ink-lt);border-left:2px solid var(--paper-3);padding:0.3rem 0.5rem;margin-top:0.4rem;display:none;line-height:1.4}
.pq-explain.show{display:block}
.check-btn{padding:0.3rem 0.8rem;border-radius:3px;border:1px solid var(--paper-3);font-size:0.72rem;cursor:pointer;background:white;color:var(--ink-mid)}
.check-btn:hover{background:var(--paper-2)}

/* REFLECT */
.ref{border:1px solid var(--paper-3);border-radius:8px;padding:0.85rem 1rem;margin-top:0.75rem;background:var(--paper);display:none}
.ref h3{font-size:0.88rem;font-weight:500;color:var(--ink);margin-bottom:0.6rem}
.rq{font-size:0.75rem;color:var(--ink-lt);margin-bottom:3px;margin-top:0.5rem}
.er-row{display:flex;gap:4px;margin-bottom:0.5rem}
.er{padding:3px 7px;border-radius:3px;border:1px solid var(--paper-3);font-size:0.9rem;cursor:pointer;background:white}
.er.on{border-color:var(--ink-lt);background:var(--paper-2)}

.no-lesson{text-align:center;padding:3rem 1rem;color:var(--ink-lt);font-size:0.88rem}

@media(max-width:480px){.tbl .og{display:none}.tbl td{width:100%!important}.picker-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

{id:3,cat:2,catN:'感受',title:'項脊軒志',author:'歸有光',

  {phase:1,type:'擷取訊息',q:'根據原文，項脊軒有哪些「缺點」？（選出描述的所有缺點）',opts:['太小、漏水、朝北光線不足','太舊、太貴、太遠','沒有書桌、沒有窗戶、沒有床','太熱、太暗、太吵'],ans:0,explain:'原文描述：方丈之小（太小）、塵泥滲漉雨澤下注（漏水）、北向不能得日昏（朝北光線差）。'},
  {phase:1,type:'擷取訊息',q:'「余稍為修葺，使不上漏」說明歸有光做了什麼？',opts:['把房子完全重建','稍微整修讓它不再從上面漏水','請工匠大規模翻修','把房子賣掉換新的'],ans:1,explain:'「稍為修葺」是「稍微整修」，不是大規模重建；「使不上漏」是目的——讓它不再漏水。'},
  {phase:2,type:'發展解釋',q:'歸有光花大篇幅描寫書房的破舊，卻仍然選擇在這裡讀書。這段描寫想傳達什麼？',opts:['抱怨家境貧窮很可憐','透過破舊的環境反襯出讀書志向的堅定和對這個空間的深厚情感','純粹是客觀描寫房子的狀況','說明古代房子都很破舊'],ans:1,explain:'以物寄情的技法：不直接說「我熱愛讀書」或「我很貧窮但堅強」，而是讓讀者透過破舊的細節自己感受到那種情感——這比直接陳述更有感染力。'},

  {phase:3,type:'省思評鑑',q:'歸有光選擇用「移桌子找不到地方放」「下雨漏水」這些細節，而不是說「我的書房很破舊」。你認為這種寫法為什麼比直接陳述更有力量？試著用一個你自己的例子說明。',opts:null,ans:null,explain:''},

var SNAMES=['斷句切段','補主語','標生字詞','逐句白話','整段潤飾'];

function getLessonById(id){return LESSONS.find(function(l){return l.id===id;})||null;}
function getExtraById(id){return EXTRA.find(function(e){return e.id===id;})||null;}

function buildPicker(){
  var g=document.getElementById('lpGrid');
  g.innerHTML='';
  LESSONS.concat(EXTRA).forEach(function(l){
    var b=document.createElement('button');
    var isExtra=!getLessonById(l.id);
    b.className='pb'+(CUR&&CUR.id===l.id?' active':'')+(DONE[l.id]?' done':'');
    var catC=['','ct1','ct2','ct3'][l.cat];
    b.innerHTML='<span class="cat-tag '+catC+'">'+l.catN+'</span>〈'+l.title+'〉'+(isExtra?'<br><span style="font-size:0.6rem;color:var(--ink-lt)">即將開放</span>':'');
    if(isExtra){b.style.opacity='0.5';b.style.cursor='default';}
    else b.onclick=(function(lesson){return function(){selectLesson(lesson)}})(l);
    g.appendChild(b);
  });
}

function selectLesson(l){
  CUR=l; STEPIDX=0; PHASE=1;
  if(!DONE[l.id]) DONE[l.id]={steps:[false,false,false,false,false],pisa:{}};
  buildPicker();
  renderMain();
}

function renderMain(){
  if(!CUR){document.getElementById('mainArea').innerHTML='<div class="no-lesson">← 請先選擇上方的篇目</div>';return;}
  var l=CUR;
  var d=DONE[l.id];
  var done5=d.steps.filter(Boolean).length;
  var pisaDone=Object.keys(d.pisa).length;
  var total=(l.pisa?l.pisa.filter(function(q){return q.opts;}).length:0)+5;
  var totalDone=done5+Object.keys(d.pisa).filter(function(k){return d.pisa[k]&&d.pisa[k].answered;}).length;
  var pct=total>0?Math.round(totalDone/total*100):0;

  var html='';

  // progress
  html+='<div class="prog-wrap"><div class="prog-row"><span>〈'+l.title+'〉'+l.author+'</span><span>'+totalDone+'/'+total+' · '+pct+'%</span></div><div class="prog-bar"><div class="prog-fill" id="pf" style="width:'+pct+'%"></div></div></div>';

  // phase tabs
  html+='<div class="phase-nav">';
  html+='<button class="phase-btn p1'+(PHASE===1?' on':'')+'\" onclick="setPhase(1)">【第一層】擷取訊息</button>';
  html+='<button class="phase-btn p2'+(PHASE===2?' on':'')+'\" onclick="setPhase(2)">【第二層】發展解釋</button>';
  html+='<button class="phase-btn p3'+(PHASE===3?' on':'')+'\" onclick="setPhase(3)">【第三層】省思評鑑</button>';
  html+='<button class="phase-btn'+(PHASE===0?' on':'')+'\" onclick="setPhase(0)">五步翻譯練習</button>';
  html+='</div>';

  // source
  html+='<div class="src-box" onclick="toggleSrc(this)"><div class="src-hd"><span>〈'+l.title+'〉原文段落</span><span id="stg">▼ 收合</span></div><div class="src-text" id="sb">'+l.src+'</div></div>';

  // PHASE 1: 擷取訊息
  html+='<div class="phase-section'+(PHASE===1?' on':'')+'\">';
  html+='<div class="retrieval-box"><h4>⚡ 提取練習：先想再讀</h4><p>在開始答題之前，請先花30秒：不看原文，說出你記得的這段文字的主要內容。</p>';
  html+='<textarea class="ta ta-sm" id="recall1" placeholder="'+l.recall+'"></textarea></div>';
  var p1qs=(l.pisa||[]).filter(function(q){return q.phase===1;});
  p1qs.forEach(function(q,qi){html+=renderPisaQ(q,qi,1);});
  html+='<div class="br"><button class="btn ok" onclick="setPhase(2)">進入第二層：發展解釋 →</button></div>';
  html+='</div>';

  // PHASE 2: 發展解釋
  html+='<div class="phase-section'+(PHASE===2?' on':'')+'\">';
  html+='<div class="pisa-head p2"><h3>第二層｜發展解釋</h3><p>這一層需要你自己推論，從文字的表面意義走向作者的深層意圖。AI 卡關提示在這一層會更保守。</p></div>';
  var p2qs=(l.pisa||[]).filter(function(q){return q.phase===2;});
  p2qs.forEach(function(q,qi){html+=renderPisaQ(q,qi,2);});
  html+='<div class="br"><button class="btn ok" onclick="setPhase(3)">進入第三層：省思評鑑 →</button></div>';
  html+='</div>';

  // PHASE 3: 省思評鑑
  html+='<div class="phase-section'+(PHASE===3?' on':'')+'\">';
  html+='<div class="pisa-head p3"><h3>第三層｜省思評鑑</h3><p>這一層完全是你的聲音。沒有標準答案，但需要有你的立場、你的理由、你的例子。AI 在這一層不提供任何提示。</p></div>';
  var p3qs=(l.pisa||[]).filter(function(q){return q.phase===3;});
  p3qs.forEach(function(q,qi){html+=renderPisaQ(q,qi,3);});
  html+='<div class="br"><button class="btn ok" onclick="setPhase(0)">前往五步翻譯練習 →</button></div>';
  html+='</div>';

  // PHASE 0: 五步翻譯
  html+='<div class="phase-section'+(PHASE===0?' on':'')+'\">';
  html+='<div class="retrieval-box"><h4>⚡ 翻譯前：先預測</h4><p>在開始翻譯之前，不看注釋，先用你對文字的第一印象，猜猜看整段的大意是什麼。</p>';
  html+='<textarea class="ta ta-sm" id="predict0" placeholder="'+l.predict+'"></textarea></div>';
  // step dots
  html+='<div class="dots" id="dots">';
  for(var i=0;i<5;i++){
    var isDone=d.steps[i];
    var isAct=i===STEPIDX;
    var dc=['#991b1b','#854d0e','#166534','#1e40af','#5b21b6'][i];
    html+='<div class="dot'+(isDone?' done-d':'')+'" style="'+(isAct&&!isDone?'background:'+dc+';color:white;border-color:'+dc:'')+(isDone?'background:#EAF3DE;color:#3B6D11;border-color:#97C459':'')+'" onclick="goSt('+i+')">'+(isDone?'✓':(i+1))+'</div>';
  }
  html+='</div>';
  html+=renderStep(l,STEPIDX);
  html+='</div>';

  // reflect
  if(totalDone===total){
    html+='<div class="ref" style="display:block"><h3>完成了！給自己一個回饋</h3>';
    html+='<div class="rq">今天的感受</div><div class="er-row"><button class="er" onclick="pickEr(this)">😰</button><button class="er" onclick="pickEr(this)">😅</button><button class="er" onclick="pickEr(this)">🙂</button><button class="er" onclick="pickEr(this)">😄</button><button class="er" onclick="pickEr(this)">🌟</button></div>';
    html+='<div class="rq">這篇我學到的最重要一件事：</div><textarea class="ta ta-sm" placeholder="用一句話說…"></textarea>';
    html+='<div class="rq">下次我想挑戰：</div><textarea class="ta ta-sm" placeholder="例如：挑戰版、找更多生字…"></textarea>';
    html+='<div class="br"><button class="btn nxt" onclick="sendPrompt(\'我完成了〈'+l.title+'〉的完整練習（五步翻譯＋PISA三層閱讀）。可以幫我確認翻譯和第二層解釋題的推論有沒有問題？\')">請 AI 確認我的推論 ↗</button></div></div>';
  }

  document.getElementById('mainArea').innerHTML=html;
}

function renderPisaQ(q,qi,phase){
  var colors={1:['var(--pisa1)','var(--pisa1l)'],2:['var(--pisa2)','var(--pisa2l)'],3:['var(--pisa3)','var(--pisa3l)']};
  var c=colors[phase];
  var key='p'+phase+'_'+qi;
  var saved=DONE[CUR.id]&&DONE[CUR.id].pisa[key];
  var html='<div class="pq-card">';
  html+='<div class="pq-type" style="color:'+c[0]+'">'+q.type+'</div>';
  html+='<div class="pq-q">'+q.q+'</div>';

  if(q.opts){
    html+='<div class="pq-options">';
    q.opts.forEach(function(opt,oi){
      var cls='pq-opt';
      if(saved&&saved.answered){
        if(oi===q.ans) cls+=' correct';
        else if(oi===saved.sel&&saved.sel!==q.ans) cls+=' wrong';
      } else if(saved&&saved.sel===oi) cls+=' sel';
      html+='<div class="'+cls+'" onclick="selectOpt(\''+key+'\','+oi+','+q.ans+')">';
      html+='<div class="pq-radio"></div><span>'+opt+'</span></div>';
    });
    html+='</div>';
    if(!saved||!saved.answered){
      html+='<button class="check-btn" onclick="checkOpt(\''+key+'\','+q.ans+')">確認答案</button>';
    }
    if(q.explain&&saved&&saved.answered){
      html+='<div class="pq-explain show">💡 '+q.explain+'</div>';
    }
    if(phase<=2){
      var unlocked=saved&&saved.sel!==undefined;
      html+='<div class="br"><button class="btn ask'+(unlocked?' unlocked':'')+'" onclick="'+(unlocked?'askPisa(\''+q.type+'\',\''+q.q.replace(/'/g,"\\'")+'\')':"''")+'">'+(unlocked?'不確定？請 AI 解釋推論方法 ↗':'先選一個答案，才能請 AI 提示')+'</button></div>';
    }
  } else {
    // open-ended for phase 3
    html+='<textarea class="ta" placeholder="寫下你的想法（這裡沒有標準答案，但需要有你的立場和理由）" oninput="saveOpenQ(\''+key+'\',this.value)"></textarea>';
    html+='<div style="font-size:0.65rem;color:var(--ink-lt);margin-top:0.3rem">第三層問題不提供 AI 提示，因為這裡需要的是你的聲音。</div>';
  }
  html+='</div>';
  return html;
}

function renderStep(l,si){
  var dark=['#991b1b','#854d0e','#166534','#1e40af','#5b21b6'][si];
  var light=['#fff0f0','#fffbeb','#f0fdf4','#eff6ff','#f5f3ff'][si];
  var tip=l.tips&&l.tips[si]?l.tips[si]:'找找這個步驟的關鍵線索';
  var scaf=l.scafs&&l.scafs[si]?l.scafs[si]:'先試試看再點這裡';
  var d=DONE[CUR.id];
  var userDone=d&&d.steps[si];

  var body='<div class="card"><div class="card-hd" style="background:'+light+'"><div class="nc" style="background:'+dark+'">'+(si+1)+'</div><div><div class="ct">'+SNAMES[si]+'</div><div class="cs">'+STASK[si]+'</div></div></div><div class="card-b">';
  body+='<div class="tip">'+tip+'</div>';
  body+='<div class="scaf" id="scaf'+si+'">'+scaf+'</div>';

  // LOCK: must write something before unlock
  var lockId='lock_'+si;
  var inputId='inp_'+si;

  if(si===0||si===4){
    var ph=si===0?'把原文複製到這裡，在停頓處加「/」\n例：古之學者必有師 / 師者，所以傳道受業解惑也 / …':'把所有翻譯句整理成一段，加入連接詞讓語氣通順…';
    body+='<textarea class="ta" id="'+inputId+'" placeholder="'+ph+'" oninput="onInput('+si+',this.value)"></textarea>';
  } else if(si===1){
    body+='<table class="tbl"><tr><td class="og" style="font-size:0.7rem;color:var(--ink-lt)">原文短句</td><td style="font-size:0.7rem;color:var(--ink-lt)">補入主語後</td></tr>';
    (l.rows2||[]).forEach(function(row,ri){
      body+='<tr><td class="og">'+row[0]+'</td><td><textarea placeholder="（　　）'+row[0]+'" oninput="onInput('+si+',\'x\')"></textarea></td></tr>';
    });
    body+='</table>';
  } else if(si===2){
    body+='<table class="gtbl"><tr><td class="gw" style="font-size:0.7rem;color:var(--ink-lt)">字詞</td><td class="gm" style="font-size:0.7rem;color:var(--ink-lt)">注釋</td></tr>';
    (l.gloss||[]).forEach(function(g){
      body+='<tr><td class="gw">'+g[0]+'</td><td class="gm">'+g[1]+'</td></tr>';
    });
    body+='</table>';
    body+='<div style="font-size:0.72rem;color:var(--ink-lt);margin-bottom:3px">我自己圈的字（輸入後按 Enter）：</div>';
    body+='<div class="mw" id="mw'+si+'" onclick="this.querySelector(\'.wi\').focus()"><input class="wi" placeholder="輸入字詞…" onkeydown="addW(event,this,'+si+')" oninput="onInput('+si+',\'x\')"/></div>';
  } else if(si===3){
    body+='<table class="tbl"><tr><td class="og" style="font-size:0.7rem;color:var(--ink-lt)">原文句</td><td style="font-size:0.7rem;color:var(--ink-lt)">我的白話翻譯</td></tr>';
    (l.rows4||[]).forEach(function(row){
      body+='<tr><td class="og">'+row[0]+'</td><td><textarea placeholder="翻成白話…" oninput="onInput('+si+',\'x\')"></textarea></td></tr>';
    });
    body+='</table>';
  }

  body+='<div class="br">';
  if(si>0) body+='<button class="btn" onclick="goSt('+(si-1)+')">← 上一步</button>';
  body+='<button class="btn ok" onclick="markDone('+si+')">'+(si<4?'完成這步 →':'完成翻譯 ✓')+'</button>';
  // ask button with lock
  var helpQ=l.helps&&l.helps[si]?l.helps[si]:'';
  var askUnlocked=window._typed&&window._typed[si];
  body+='<button class="btn ask'+(askUnlocked?' unlocked':'')+'" id="askBtn'+si+'" onclick="'+(askUnlocked&&helpQ?'sendPrompt(\''+helpQ.replace(/'/g,"\\'")+'\')':'showLockMsg()')+'">卡關了 ↗</button>';
  body+='</div>';
  body+='<div class="hint">'+(askUnlocked?'「卡關了」會請 AI 給提示，不直接給答案':'先填寫一點內容，才能解鎖「卡關了」按鈕')+'</div>';
  body+='<div style="margin-top:0.4rem"><button style="font-size:0.68rem;color:var(--ink-lt);background:none;border:none;cursor:pointer;padding:0" onclick="toggleScaf('+si+')">顯示起步提示 ▾</button></div>';
  body+='</div></div>';
  return body;
}

var _typed={};
function onInput(si,val){
  _typed[si]=val&&val.length>0;
  var btn=document.getElementById('askBtn'+si);
  if(btn){
    if(_typed[si]){btn.classList.add('unlocked');btn.title='';}
    else{btn.classList.remove('unlocked');}
    if(CUR&&CUR.helps&&CUR.helps[si]&&_typed[si]){
      btn.onclick=function(){sendPrompt(CUR.helps[si]);};
    } else {
      btn.onclick=showLockMsg;
    }
  }
}

function showLockMsg(){
  alert('請先填寫一點內容（哪怕只有一個字），才能解鎖卡關求救。\n\n學習科學告訴我們：先嘗試，再求助，記憶效果最好！');
}

function toggleScaf(si){var s=document.getElementById('scaf'+si);if(s)s.classList.toggle('on');}
function addW(e,inp,si){if(e.key==='Enter'&&inp.value.trim()){var w=inp.value.trim();var b=document.createElement('span');b.className='wb';b.innerHTML=w+'<span onclick="this.parentNode.remove()">×</span>';inp.parentNode.insertBefore(b,inp);inp.value='';onInput(si,'x');}}
function goSt(i){STEPIDX=i;_typed={};renderMain();}
function toggleSrc(el){var sb=document.getElementById('sb');var tg=document.getElementById('stg');if(sb){sb.classList.toggle('hide');tg.textContent=sb.classList.contains('hide')?'▶ 展開':'▼ 收合';}}

function markDone(si){
  if(!DONE[CUR.id]) DONE[CUR.id]={steps:[false,false,false,false,false],pisa:{}};
  DONE[CUR.id].steps[si]=true;
  _typed={};
  if(si<4){STEPIDX=si+1;} else {STEPIDX=4;}
  renderMain();
  buildPicker();
}

function setPhase(p){PHASE=p;_typed={};renderMain();}

function selectOpt(key,oi,ans){
  if(!DONE[CUR.id]) DONE[CUR.id]={steps:[false,false,false,false,false],pisa:{}};
  if(DONE[CUR.id].pisa[key]&&DONE[CUR.id].pisa[key].answered) return;
  DONE[CUR.id].pisa[key]=DONE[CUR.id].pisa[key]||{};
  DONE[CUR.id].pisa[key].sel=oi;
  renderMain();
}

function checkOpt(key,ans){
  if(!DONE[CUR.id]||!DONE[CUR.id].pisa[key]||DONE[CUR.id].pisa[key].sel===undefined){
    alert('請先選擇一個答案！');return;
  }
  DONE[CUR.id].pisa[key].answered=true;
  renderMain();
}

function saveOpenQ(key,val){
  if(!DONE[CUR.id]) DONE[CUR.id]={steps:[false,false,false,false,false],pisa:{}};
  DONE[CUR.id].pisa[key]={answered:val.length>20,val:val};
}

function askPisa(type,q){
  sendPrompt('我在做「'+type+'」類型的閱讀題目，題目是：「'+q+'」。請給我思考這種題型的方法，但不要直接告訴我答案是什麼。');
}

function pickEr(el){document.querySelectorAll('.er').forEach(function(e){e.classList.remove('on');});el.classList.add('on');}

buildPicker();
</script>
</body>
</html>
